name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and build
        run: npm run check

      - name: Pack release artifact
        run: |
          mkdir -p release
          npm pack --pack-destination release
          mv release/*.tgz release/structvibe-cli.tgz
          cd release
          sha256sum structvibe-cli.tgz > structvibe-cli.tgz.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release/structvibe-cli.tgz
          release/structvibe-cli.tgz.sha256
          --verify-tag
          --generate-notes
          --title "StructVibe CLI $GITHUB_REF_NAME"
